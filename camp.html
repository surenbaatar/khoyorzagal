<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Khoyor Zagal — Camp Manager</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.44.0/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f5f5f0;color:#1a1a1a;font-size:14px;height:100vh;overflow:hidden;display:flex;flex-direction:column}

/* ─── LOGIN ─── */
.login-screen{position:fixed;inset:0;background:linear-gradient(135deg,#D1FAE5 0%,#f5f5f0 100%);display:flex;align-items:center;justify-content:center;z-index:500}
.login-screen.hidden{display:none}
.login-card{background:#fff;border:1px solid #e0dfd8;border-radius:16px;padding:40px 36px;width:380px;box-shadow:0 8px 40px rgba(0,0,0,.08)}
.login-logo{text-align:center;margin-bottom:28px}
.login-logo i{font-size:40px;color:#059669;display:block;margin-bottom:8px}
.login-logo h1{font-size:20px;font-weight:700}
.login-logo .camp{font-size:12px;color:#888;margin-top:2px}
.login-logo .badge{display:inline-block;font-size:10px;padding:3px 10px;border-radius:12px;background:#D1FAE5;color:#059669;font-weight:600;margin-top:8px}
.login-field{margin-bottom:16px}
.login-field label{display:block;font-size:12px;font-weight:600;color:#666;margin-bottom:5px}
.login-field input{width:100%;padding:10px 14px;font-size:14px;border:1px solid #ddd;border-radius:8px;background:#fff;color:#1a1a1a;transition:all .15s}
.login-field input:focus{outline:none;border-color:#059669;box-shadow:0 0 0 3px rgba(5,150,105,.12)}
.login-btn{width:100%;padding:12px;font-size:14px;font-weight:600;border:none;border-radius:8px;background:#059669;color:#fff;cursor:pointer;transition:all .15s;margin-top:8px;display:flex;align-items:center;justify-content:center;gap:8px}
.login-btn:hover{background:#047857}
.login-error{font-size:12px;color:#DC2626;text-align:center;margin-top:10px;display:none}
.login-error.show{display:block}
.login-hint{font-size:11px;color:#bbb;text-align:center;margin-top:16px}
.login-back{text-align:center;margin-top:14px}
.login-back a{font-size:11px;color:#059669;text-decoration:none}

/* ─── APP ─── */
.app{display:none;flex-direction:column;height:100vh}
.app.visible{display:flex}
.top-bar{background:#fff;border-bottom:1px solid #e0dfd8;padding:0 24px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;z-index:100;height:50px}
.top-bar-left{display:flex;align-items:center;gap:16px}
.top-bar h1{font-size:16px;font-weight:600;display:flex;align-items:center;gap:8px;color:#059669}
.camp-badge{font-size:11px;padding:3px 10px;border-radius:20px;background:#D1FAE5;color:#059669;font-weight:500}
.top-bar-right{display:flex;align-items:center;gap:10px}
.user-badge{font-size:12px;color:#666;display:flex;align-items:center;gap:5px;padding:4px 10px;background:#fafaf7;border-radius:6px;border:1px solid #eee}
.user-badge i{font-size:13px;color:#059669}
.nav-link{display:flex;align-items:center;gap:5px;font-size:13px;color:#534AB7;text-decoration:none;font-weight:500;padding:5px 12px;border-radius:6px;border:1px solid #ddd;background:#fff;cursor:pointer;transition:all .15s}
.nav-link:hover{background:#EEEDFE;border-color:#534AB7}
.logout-btn{display:flex;align-items:center;gap:4px;font-size:12px;color:#999;border:1px solid #ddd;background:#fff;padding:5px 10px;border-radius:6px;cursor:pointer;transition:all .15s}
.logout-btn:hover{color:#DC2626;border-color:#fca5a5;background:#FEE2E2}

/* ─── THREE-PANEL LAYOUT ─── */
.panels{display:flex;flex:1;overflow:hidden}

/* Calendar sidebar */
.cal-sidebar{width:260px;min-width:240px;border-right:1px solid #e0dfd8;display:flex;flex-direction:column;background:#fff;flex-shrink:0;overflow-y:auto}
.cal-sidebar::-webkit-scrollbar{width:4px}
.cal-sidebar::-webkit-scrollbar-thumb{background:#ccc;border-radius:4px}
.mini-cal{padding:14px 12px 10px}
.mini-cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.mini-cal-nav .mc-title{font-size:14px;font-weight:700;color:#1a1a1a;cursor:pointer}
.mini-cal-nav button{width:28px;height:28px;border:1px solid #e0dfd8;border-radius:6px;background:#fff;color:#888;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;transition:all .15s}
.mini-cal-nav button:hover{background:#D1FAE5;color:#059669;border-color:#059669}
.mc-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;text-align:center}
.mc-grid .mc-dow{font-size:10px;font-weight:700;color:#999;padding:4px 0;text-transform:uppercase}
.mc-day{position:relative;font-size:12px;padding:5px 2px;border-radius:6px;cursor:pointer;transition:all .12s;color:#1a1a1a;line-height:1}
.mc-day:hover{background:#D1FAE5}
.mc-day.empty{cursor:default}.mc-day.empty:hover{background:transparent}
.mc-day.today{font-weight:700;color:#059669;background:#ecfdf5}
.mc-day.selected{background:#059669;color:#fff;font-weight:700}
.mc-day.selected:hover{background:#047857}
.mc-day.other-month{color:#ccc}
.mc-day .mc-dots{display:flex;gap:2px;justify-content:center;margin-top:2px;height:4px}
.mc-day .mc-dot{width:4px;height:4px;border-radius:50%}
.mc-day.selected .mc-dot{opacity:.7}

.sidebar-stats{padding:0 14px 14px}
.sidebar-stat-card{background:#fafaf7;border:1px solid #eee;border-radius:8px;padding:10px 12px;margin-bottom:8px}
.sidebar-stat-card .ssc-label{font-size:10px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.3px}
.sidebar-stat-card .ssc-value{font-size:18px;font-weight:700;margin-top:2px}
.sidebar-stat-card .ssc-sub{font-size:11px;color:#888;margin-top:2px}
.sidebar-stat-row{display:flex;gap:8px}
.sidebar-stat-row .sidebar-stat-card{flex:1}

.sidebar-date-info{padding:0 14px 14px}
.sdi-title{font-size:11px;font-weight:700;color:#059669;text-transform:uppercase;letter-spacing:.3px;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.sdi-item{font-size:12px;padding:6px 8px;border-radius:6px;border:1px solid #eee;margin-bottom:4px;cursor:pointer;transition:all .12s;display:flex;align-items:center;gap:8px}
.sdi-item:hover{background:#D1FAE5;border-color:#059669}
.sdi-item.active{background:#D1FAE5;border-color:#059669}
.sdi-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.sdi-name{flex:1;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sdi-badge{flex-shrink:0}

/* Middle panel */
.mid-panel{width:380px;min-width:320px;max-width:440px;border-right:1px solid #e0dfd8;display:flex;flex-direction:column;background:#fff;flex-shrink:0}
.lp-toolbar{padding:10px 16px;border-bottom:1px solid #e0dfd8;display:flex;flex-direction:column;gap:8px;background:#fafaf7}
.lp-toolbar-row{display:flex;align-items:center;gap:8px}
.lp-search-wrap{position:relative;flex:1}
.lp-search-wrap i{position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:14px;color:#999;pointer-events:none}
.lp-search{width:100%;padding:7px 12px 7px 32px;font-size:13px;border:1px solid #ddd;border-radius:6px;background:#fff;color:#1a1a1a}
.lp-search:focus{outline:none;border-color:#059669;box-shadow:0 0 0 2px rgba(5,150,105,.12)}
.filter-btn{padding:5px 10px;font-size:11px;font-weight:600;border:1px solid #ddd;border-radius:6px;cursor:pointer;background:#fff;color:#666;transition:all .15s;white-space:nowrap}
.filter-btn:hover{background:#f0efe8}
.filter-btn.active{background:#059669;color:#fff;border-color:#059669}
.lp-summary{display:flex;gap:12px;padding:0 4px}
.lp-stat{font-size:11px;color:#888;display:flex;align-items:center;gap:4px}
.lp-stat strong{color:#1a1a1a;font-weight:700}
.lp-stat.green strong{color:#15803D}
.lp-stat.orange strong{color:#B45309}
.date-filter-bar{display:flex;align-items:center;gap:8px}
.date-filter-bar span{font-size:11px;color:#059669;font-weight:600;display:flex;align-items:center;gap:4px}
.date-filter-bar button{font-size:10px;padding:2px 8px;border:1px solid #ddd;border-radius:4px;background:#fff;color:#888;cursor:pointer}

.lp-list{flex:1;overflow-y:auto}
.lp-list::-webkit-scrollbar{width:4px}
.lp-list::-webkit-scrollbar-thumb{background:#ccc;border-radius:4px}

/* Walk-in services section */
.walkin-section{border-top:2px solid #e0dfd8;padding:12px 16px;flex-shrink:0;background:#fafaf7}
.walkin-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.walkin-title{font-size:11px;font-weight:700;color:#059669;text-transform:uppercase;letter-spacing:.3px;display:flex;align-items:center;gap:6px}
.walkin-add-btn{font-size:11px;padding:4px 10px;border:1px solid #059669;border-radius:6px;background:#fff;color:#059669;cursor:pointer;font-weight:600;display:flex;align-items:center;gap:4px;transition:all .15s}
.walkin-add-btn:hover{background:#D1FAE5}
.walkin-items{max-height:120px;overflow-y:auto}
.walkin-items::-webkit-scrollbar{width:3px}
.walkin-items::-webkit-scrollbar-thumb{background:#ccc;border-radius:3px}
.walkin-item{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid #eee;font-size:12px}
.walkin-item:last-child{border-bottom:none}
.walkin-item .wi-desc{flex:1;font-weight:500}
.walkin-item .wi-qty{color:#059669;font-weight:700;min-width:30px;text-align:center}
.walkin-item .wi-amt{font-weight:700;color:#1a1a1a;min-width:80px;text-align:right}
.walkin-item .wi-del{width:20px;height:20px;border:none;background:none;color:#ccc;cursor:pointer;font-size:12px;border-radius:4px;display:flex;align-items:center;justify-content:center}
.walkin-item .wi-del:hover{color:#DC2626;background:#FEE2E2}
.walkin-empty{font-size:11px;color:#bbb;text-align:center;padding:8px;font-style:italic}
.walkin-total{display:flex;justify-content:space-between;padding:6px 0 0;border-top:1px solid #ddd;margin-top:4px;font-size:12px;font-weight:700}

/* Walk-in form */
.walkin-form{margin-top:8px;background:#fff;border:1px solid #e0dfd8;border-radius:8px;padding:10px;display:none}
.walkin-form.show{display:block}
.walkin-form label{font-size:10px;color:#666;display:block;margin-bottom:2px;font-weight:600}
.walkin-form select,.walkin-form input{width:100%;padding:6px 8px;font-size:12px;border:1px solid #ddd;border-radius:5px;margin-bottom:6px;background:#fff;color:#1a1a1a}
.walkin-form select:focus,.walkin-form input:focus{outline:none;border-color:#059669}
.wf-row{display:flex;gap:6px}
.wf-row>div{flex:1}
.wf-actions{display:flex;gap:6px;margin-top:4px}
.wf-btn{padding:6px 12px;font-size:11px;font-weight:600;border:none;border-radius:5px;cursor:pointer;display:flex;align-items:center;gap:4px}
.wf-save{background:#059669;color:#fff}
.wf-save:hover{background:#047857}
.wf-cancel{background:#fff;color:#666;border:1px solid #ddd}

/* Booking row */
.bk-row{display:flex;align-items:center;padding:10px 16px;border-bottom:1px solid #f0efe8;cursor:pointer;transition:background .1s;gap:10px}
.bk-row:hover{background:#f9faf8}
.bk-row.selected{background:#ECFDF5;border-left:3px solid #059669;padding-left:13px}
.bk-row.cancelled{opacity:.5}
.bk-row.cancelled .bk-company{text-decoration:line-through;color:#999}
.bk-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.bk-info{flex:1;min-width:0}
.bk-company{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bk-meta{font-size:11px;color:#888;margin-top:2px;display:flex;gap:8px;flex-wrap:wrap}
.bk-meta span{display:flex;align-items:center;gap:3px}
.bk-right{text-align:right;flex-shrink:0}
.bk-badges{display:flex;flex-direction:column;align-items:flex-end;gap:3px}
.status-badge{font-size:9px;font-weight:700;padding:2px 8px;border-radius:10px;white-space:nowrap;display:inline-block;text-transform:uppercase;letter-spacing:.3px}
.status-inhouse{background:#DCFCE7;color:#15803D}
.status-upcoming{background:#DBEAFE;color:#1D4ED8}
.status-checkedout{background:#FEF3C7;color:#B45309}
.status-finalized{background:#EDE9FE;color:#7C3AED}
.status-cancelled{background:#f0efe8;color:#888}
.lp-empty{text-align:center;padding:40px 20px;color:#bbb}
.lp-empty i{font-size:32px;display:block;margin-bottom:8px;opacity:.3}

/* ─── RIGHT PANEL ─── */
.right-panel{flex:1;display:flex;flex-direction:column;overflow:hidden;background:#f5f5f0}
.rp-empty{flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;color:#bbb;gap:10px}
.rp-empty i{font-size:56px;opacity:.25}
.rp-empty p{font-size:14px}
.rp-empty .hint{font-size:12px;color:#ccc}
.rp-header{padding:16px 24px;background:#fff;border-bottom:1px solid #e0dfd8;flex-shrink:0}
.rp-company{font-size:20px;font-weight:700;display:flex;align-items:center;gap:10px;margin-bottom:8px}
.rp-company .dot{width:14px;height:14px;border-radius:50%;flex-shrink:0}
.rp-meta{display:flex;flex-wrap:wrap;gap:10px;font-size:12px;color:#666}
.rp-meta span{display:flex;align-items:center;gap:4px}
.rp-stats{display:flex;gap:20px;flex-wrap:wrap;margin-top:10px}
.rp-stat{text-align:center}
.rp-stat .rs-label{font-size:10px;color:#888;text-transform:uppercase;letter-spacing:.3px;font-weight:600}
.rp-stat .rs-value{font-size:18px;font-weight:700;margin-top:2px}
.rs-value.emerald{color:#059669}.rs-value.green{color:#15803D}.rs-value.orange{color:#B45309}.rs-value.red{color:#DC2626}
.rp-body{flex:1;overflow-y:auto;padding:20px 24px}
.rp-body::-webkit-scrollbar{width:4px}
.rp-body::-webkit-scrollbar-thumb{background:#ccc;border-radius:4px}
.rp-section{background:#fff;border:1px solid #e0dfd8;border-radius:10px;padding:16px 18px;margin-bottom:16px}
.rp-section-title{font-size:10px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid #eee;display:flex;align-items:center;gap:6px}
.rp-section-title i{font-size:14px;color:#059669}
.trip-line{display:flex;justify-content:space-between;align-items:baseline;font-size:13px;padding:4px 0}
.trip-line .tl-label{color:#888;font-size:12px}
.trip-line .tl-value{font-weight:600}

/* Adjustments */
.adj-table{width:100%;border-collapse:collapse;font-size:13px}
.adj-table th{text-align:left;font-size:10px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.3px;padding:6px 8px;border-bottom:2px solid #eee}
.adj-table td{padding:8px;border-bottom:1px solid #f0efe8;vertical-align:middle}
.adj-table tr:last-child td{border-bottom:none}
.adj-amount{font-weight:700;font-variant-numeric:tabular-nums;text-align:right}
.adj-amount.charge{color:#059669}
.adj-delete{width:24px;height:24px;border:none;background:none;color:#ccc;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;border-radius:4px;transition:all .15s}
.adj-delete:hover{color:#DC2626;background:#FEE2E2}
.adj-empty{color:#bbb;font-size:12px;text-align:center;padding:16px;font-style:italic}
.adj-actions{display:flex;gap:8px;margin-top:12px}
.adj-btn{padding:8px 16px;font-size:13px;font-weight:600;border:none;border-radius:6px;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:6px}
.adj-btn-charge{background:#059669;color:#fff}.adj-btn-charge:hover{background:#047857}

.adj-form{background:#fafaf7;border:1px solid #e0dfd8;border-radius:8px;padding:14px;margin-top:12px;display:none}
.adj-form.show{display:block}
.adj-form-title{font-size:12px;font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.adj-form-title.charge{color:#059669}
.adj-form label{font-size:11px;color:#666;display:block;margin-bottom:3px;font-weight:500}
.adj-form select,.adj-form input,.adj-form textarea{width:100%;padding:7px 10px;font-size:13px;border:1px solid #ddd;border-radius:6px;background:#fff;color:#1a1a1a;font-family:inherit;margin-bottom:8px}
.adj-form select:focus,.adj-form input:focus,.adj-form textarea:focus{outline:none;border-color:#059669;box-shadow:0 0 0 2px rgba(5,150,105,.12)}
.adj-form textarea{resize:vertical;min-height:40px}
.adj-form-actions{display:flex;gap:8px;margin-top:6px}
.adj-form-btn{padding:8px 16px;font-size:13px;font-weight:600;border:none;border-radius:6px;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:6px}
.adj-form-save{background:#059669;color:#fff}.adj-form-save:hover{background:#047857}
.adj-form-cancel{background:#fff;color:#666;border:1px solid #ddd}
/* Actuals table */
.actuals-tbl{width:100%;border-collapse:collapse;font-size:13px;margin-top:8px}
.actuals-tbl th{text-align:left;font-size:10px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.3px;padding:6px 8px;border-bottom:2px solid #eee}
.actuals-tbl td{padding:6px 8px;border-bottom:1px solid #f0efe8;vertical-align:middle}
.actuals-tbl tr:last-child td{border-bottom:none}
.actuals-tbl .at-label{color:#555;font-weight:500}
.actuals-tbl .at-booked{color:#888;text-align:center;font-variant-numeric:tabular-nums}
.actuals-tbl .at-actual{text-align:center}
.actuals-tbl .at-actual input{width:56px;padding:4px 6px;font-size:13px;border:1px solid #ddd;border-radius:5px;text-align:center;font-family:inherit;background:#fff;color:#1a1a1a;font-variant-numeric:tabular-nums}
.actuals-tbl .at-actual input:focus{outline:none;border-color:#059669;box-shadow:0 0 0 2px rgba(5,150,105,.12)}
.actuals-tbl .at-diff{text-align:center;font-weight:700;font-size:12px;font-variant-numeric:tabular-nums}
.at-diff.same{color:#aaa}.at-diff.less{color:#B45309}.at-diff.more{color:#059669}
.actuals-save-row{display:flex;align-items:center;gap:8px;margin-top:10px}
.actuals-save-btn{padding:7px 16px;font-size:12px;font-weight:600;border:none;border-radius:6px;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:5px;background:#059669;color:#fff}
.actuals-save-btn:hover{background:#047857}
.actuals-saved{font-size:11px;color:#059669;font-weight:500;display:none}
.actuals-note{margin-top:8px}
.actuals-note textarea{width:100%;padding:7px 10px;font-size:12px;border:1px solid #ddd;border-radius:6px;background:#fff;color:#1a1a1a;font-family:inherit;resize:vertical;min-height:36px}
.actuals-note textarea:focus{outline:none;border-color:#059669;box-shadow:0 0 0 2px rgba(5,150,105,.12)}
.actuals-note label{font-size:11px;color:#666;display:block;margin-bottom:3px;font-weight:500}

/* Finalize */
.finalize-section{margin-top:0}
.finalize-box{background:#fafaf7;border:1px solid #e0dfd8;border-radius:8px;padding:14px}
.finalize-box label{font-size:11px;color:#666;display:block;margin-bottom:3px;font-weight:500}
.finalize-box textarea{width:100%;padding:7px 10px;font-size:13px;border:1px solid #ddd;border-radius:6px;background:#fff;color:#1a1a1a;font-family:inherit;resize:vertical;min-height:50px;margin-bottom:10px}
.finalize-box textarea:focus{outline:none;border-color:#059669;box-shadow:0 0 0 2px rgba(5,150,105,.12)}
.finalize-btn{width:100%;padding:12px;font-size:14px;font-weight:700;border:none;border-radius:8px;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:8px}
.finalize-btn-go{background:#7C3AED;color:#fff}.finalize-btn-go:hover{background:#6D28D9}
.finalize-btn-reopen{background:#fff;color:#B45309;border:2px solid #B45309}.finalize-btn-reopen:hover{background:#FEF3C7}
.finalized-info{display:flex;align-items:center;gap:10px;padding:12px;background:#EDE9FE;border:1px solid #C4B5FD;border-radius:8px;margin-bottom:12px}
.finalized-info i{font-size:20px;color:#7C3AED;flex-shrink:0}
.finalized-info .fi-text{flex:1}
.finalized-info .fi-who{font-size:13px;font-weight:600;color:#5B21B6}
.finalized-info .fi-when{font-size:11px;color:#888;margin-top:2px}
.finalized-info .fi-notes{font-size:12px;color:#666;margin-top:4px;font-style:italic}

.hidden{display:none!important}

/* Responsive */
@media(max-width:1200px){.cal-sidebar{width:230px;min-width:220px}.mid-panel{width:340px;min-width:300px}}
@media(max-width:900px){.cal-sidebar{display:none}.mid-panel{width:360px;min-width:300px}}
@media(max-width:700px){.panels{flex-direction:column}.mid-panel{width:100%;max-width:none;height:40vh;border-right:none;border-bottom:1px solid #e0dfd8}.right-panel{height:60vh}}
</style>
</head>
<body>

<!-- ─── LOGIN ─── -->
<div class="login-screen" id="loginScreen">
  <div class="login-card">
    <div class="login-logo">
      <i class="ti ti-trees"></i>
      <h1>Camp Manager</h1>
      <div class="camp">Trip Finalization &amp; Adjustments</div>
      <div class="badge">Khoyor Zagal</div>
    </div>
    <div class="login-field"><label>Username</label><input type="text" id="loginUser" placeholder="Enter username" autocomplete="off"></div>
    <div class="login-field"><label>Password</label><input type="password" id="loginPass" placeholder="Enter password" autocomplete="off"></div>
    <button class="login-btn" onclick="window.doLogin()"><i class="ti ti-login"></i> Sign In</button>
    <div class="login-error" id="loginError">Invalid username or password</div>
    <div class="login-hint">Camp or admin credentials required</div>
    <div class="login-back"></div>
  </div>
</div>

<!-- ─── APP ─── -->
<div class="app" id="app">
  <div class="top-bar">
    <div class="top-bar-left">
      <h1><i class="ti ti-trees"></i> Camp Manager</h1>
      <span class="camp-badge">Khoyor Zagal</span>
    </div>
    <div class="top-bar-right">
      <div class="user-badge"><i class="ti ti-user"></i> <span id="userLabel">camp</span></div>
      <button class="logout-btn" onclick="window.doLogout()"><i class="ti ti-logout"></i> Logout</button>
    </div>
  </div>

  <div class="panels">
    <!-- Left: Calendar Sidebar -->
    <div class="cal-sidebar">
      <div class="mini-cal">
        <div class="mini-cal-nav">
          <button onclick="mcPrev()"><i class="ti ti-chevron-left"></i></button>
          <span class="mc-title" id="mcTitle" onclick="mcToday()"></span>
          <button onclick="mcNext()"><i class="ti ti-chevron-right"></i></button>
        </div>
        <div class="mc-grid" id="mcGrid"></div>
      </div>
      <div class="sidebar-stats" id="sidebarStats"></div>
      <div class="sidebar-date-info" id="sidebarDateInfo"></div>
    </div>

    <!-- Middle: Booking List + Walk-ins -->
    <div class="mid-panel">
      <div class="lp-toolbar">
        <div class="lp-toolbar-row">
          <div class="lp-search-wrap"><i class="ti ti-search"></i><input class="lp-search" id="searchInput" type="text" placeholder="Search company, guide..."></div>
        </div>
        <div class="lp-toolbar-row" style="flex-wrap:wrap">
          <button class="filter-btn active" data-filter="all" onclick="window.setFilter('all',this)">All</button>
          <button class="filter-btn" data-filter="active" onclick="window.setFilter('active',this)">Active</button>
          <button class="filter-btn" data-filter="checkedout" onclick="window.setFilter('checkedout',this)">Out</button>
          <button class="filter-btn" data-filter="finalized" onclick="window.setFilter('finalized',this)">Final</button>
        </div>
        <div class="lp-toolbar-row date-filter-bar" id="dateFilterBar" style="display:none">
          <span><i class="ti ti-calendar-event" style="font-size:13px"></i> <span id="dateFilterLabel"></span></span>
          <button onclick="mcSelectDate(mcSelectedDate)">Clear date</button>
        </div>
        <div class="lp-summary" id="lpSummary"></div>
      </div>
      <div class="lp-list" id="lpList"></div>

      <!-- Walk-in Services -->
      <div class="walkin-section" id="walkinSection">
        <div class="walkin-header">
          <div class="walkin-title"><i class="ti ti-walk" style="font-size:14px"></i> Walk-in Services</div>
          <button class="walkin-add-btn" onclick="showWalkinForm()"><i class="ti ti-plus"></i> Add</button>
        </div>
        <div id="walkinList"></div>
        <div class="walkin-form" id="walkinForm">
          <label>Service</label>
          <select id="wiService" onchange="onWiServiceChange()">
            <option value="">-- Select --</option>
            <option value="Breakfast|12000">Breakfast — 12,000₮</option>
            <option value="Lunch|29000">Lunch — 29,000₮</option>
            <option value="Dinner|24000">Dinner — 24,000₮</option>
            <option value="Horse riding|80000">Horse riding — 80,000₮</option>
            <option value="Camel riding|60000">Camel riding — 60,000₮</option>
            <option value="Archery|30000">Archery — 30,000₮</option>
            <option value="Ger (1 night)|0">Ger — enter price</option>
            <option value="custom|0">Custom item...</option>
          </select>
          <div class="wf-row">
            <div><label>Description</label><input type="text" id="wiDesc" placeholder="Service name"></div>
            <div style="max-width:70px"><label>Qty</label><input type="number" id="wiQty" value="1" min="1"></div>
          </div>
          <div class="wf-row">
            <div><label>Price each (₮)</label><input type="number" id="wiPrice" placeholder="0" min="0"></div>
            <div><label>Note</label><input type="text" id="wiNote" placeholder="Optional"></div>
          </div>
          <div class="wf-actions">
            <button class="wf-btn wf-save" onclick="saveWalkin()"><i class="ti ti-check"></i> Add</button>
            <button class="wf-btn wf-cancel" onclick="hideWalkinForm()">Cancel</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Right: Detail -->
    <div class="right-panel" id="rightPanel">
      <div class="rp-empty" id="rpEmpty">
        <i class="ti ti-trees"></i>
        <p>Select a booking to view trip details</p>
        <div class="hint">Manage adjustments and finalize trips</div>
      </div>
      <div id="rpContent" class="hidden" style="display:none;flex-direction:column;flex:1;overflow:hidden;">
        <div class="rp-header" id="rpHeader"></div>
        <div class="rp-body" id="rpBody"></div>
      </div>
    </div>
  </div>
</div>

<script>
(function(){
'use strict';

/* ═══ HELPERS ═══ */
function esc(s){var d=document.createElement('div');d.appendChild(document.createTextNode(s||''));return d.innerHTML}
function escAttr(s){return (s||'').replace(/'/g,"\\'").replace(/"/g,'&quot;')}
function fmt(n){return (n||0).toLocaleString()+'₮'}
function resKey(r){return (r.company||'')+'_'+(r.checkIn||'')+'_'+(r.checkOut||'')}
function parseDate(s){if(!s)return null;var p=s.split('-');return new Date(+p[0],+p[1]-1,+p[2])}
function fmtDate(s){if(!s)return '—';var d=parseDate(s);if(!d||isNaN(d))return s;var m=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];return m[d.getMonth()]+' '+d.getDate()+', '+d.getFullYear()}
function fmtDateShort(s){if(!s)return '—';var p=s.split('-');var m=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];return m[parseInt(p[1],10)-1]+' '+parseInt(p[2],10)}
function nightCount(ci,co){var a=parseDate(ci),b=parseDate(co);if(!a||!b||isNaN(a)||isNaN(b))return 0;return Math.max(0,Math.round((b-a)/86400000))}
function todayStr(){var d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}

/* ═══ AUTH ═══ */
var SESSION_KEY='kz_camp_session',USERS_KEY='kz_users';
var currentUser=null;

(function seedUsers(){
  try{var u=JSON.parse(localStorage.getItem(USERS_KEY)||'[]');
  if(u.length===0)localStorage.setItem(USERS_KEY,JSON.stringify([
    {username:'admin',password:'admin123',role:'admin'},
    {username:'booking',password:'kz2026',role:'booking'},
    {username:'finance',password:'kz2026',role:'finance'},
    {username:'camp',password:'kz2026',role:'camp'}
  ]))}catch(e){}
})();

function checkSession(){
  try{var s=JSON.parse(localStorage.getItem(SESSION_KEY)||'null');
  if(s&&s.username&&s.ts&&(Date.now()-s.ts<86400000)&&(s.role==='camp'||s.role==='admin')){currentUser=s;return true;}}catch(e){}
  return false;
}
function showApp(){
  document.getElementById('loginScreen').classList.add('hidden');
  document.getElementById('app').classList.add('visible');
  document.getElementById('userLabel').textContent=currentUser.username;
  initData();
}
window.doLogin=function(){
  var u=document.getElementById('loginUser').value.trim(),p=document.getElementById('loginPass').value,err=document.getElementById('loginError');
  err.classList.remove('show');
  if(!u||!p){err.textContent='Please enter username and password';err.classList.add('show');return;}
  try{var users=JSON.parse(localStorage.getItem(USERS_KEY)||'[]');
  var found=users.find(function(x){return x.username===u&&x.password===p});
  if(!found){err.textContent='Invalid username or password';err.classList.add('show');return;}
  if(found.role!=='camp'&&found.role!=='admin'){err.textContent='Access denied. Camp or admin role required.';err.classList.add('show');return;}
  currentUser={username:found.username,role:found.role,ts:Date.now()};
  localStorage.setItem(SESSION_KEY,JSON.stringify(currentUser));
  showApp();}catch(e){err.textContent='Login error';err.classList.add('show')}
};
window.doLogout=function(){localStorage.removeItem(SESSION_KEY);currentUser=null;location.reload()};
document.getElementById('loginPass').addEventListener('keydown',function(e){if(e.key==='Enter')window.doLogin()});
document.getElementById('loginUser').addEventListener('keydown',function(e){if(e.key==='Enter')document.getElementById('loginPass').focus()});

/* ═══ DATA ═══ */
var reservations=[];
var selectedKey=null;
var currentFilter='all';
var searchTerm='';

function loadReservations(){try{return JSON.parse(localStorage.getItem('kz_reservations')||'[]')}catch(e){return[]}}
function loadPayments(){try{return JSON.parse(localStorage.getItem('kz_payments')||'{}')}catch(e){return{}}}
function loadAdjustments(){try{return JSON.parse(localStorage.getItem('kz_trip_adjustments')||'{}')}catch(e){return{}}}
function saveAdjustments(a){localStorage.setItem('kz_trip_adjustments',JSON.stringify(a))}
function loadTripStatus(){try{return JSON.parse(localStorage.getItem('kz_trip_status')||'{}')}catch(e){return{}}}
function saveTripStatus(t){localStorage.setItem('kz_trip_status',JSON.stringify(t))}
function loadWalkins(){try{return JSON.parse(localStorage.getItem('kz_walkin_services')||'{}')}catch(e){return{}}}
function saveWalkins(w){localStorage.setItem('kz_walkin_services',JSON.stringify(w))}

function getBookingStatus(r){
  if(r.cancelled)return 'cancelled';
  var key=resKey(r),ts=loadTripStatus(),td=todayStr();
  if(ts[key]&&ts[key].status==='finalized')return 'finalized';
  if(r.checkIn>td)return 'upcoming';
  if(r.checkOut<=td)return 'checkedout';
  return 'inhouse';
}
function getTotalPaid(key){var p=loadPayments(),arr=p[key]||[],t=0;for(var i=0;i<arr.length;i++)t+=Number(arr[i].amount)||0;return t}
function getAdjTotals(key){var a=loadAdjustments(),arr=a[key]||[],c=0,d=0;for(var i=0;i<arr.length;i++){if(arr[i].type==='charge')c+=Number(arr[i].amount)||0;else d+=Number(arr[i].amount)||0}return{charges:c,deductions:d}}

/* ═══ TRIP ACTUALS ═══ */
function loadActuals(){try{return JSON.parse(localStorage.getItem('kz_trip_actuals'))||{}}catch(e){return{}}}
function saveActuals(d){localStorage.setItem('kz_trip_actuals',JSON.stringify(d))}

/* ═══ MINI CALENDAR ═══ */
var mcYear,mcMonth,mcSelectedDate=null;
(function(){var d=new Date();mcYear=d.getFullYear();mcMonth=d.getMonth()})();
var MONTH_NAMES=['January','February','March','April','May','June','July','August','September','October','November','December'];

function getBookingDatesMap(){
  var map={};
  for(var i=0;i<reservations.length;i++){
    var r=reservations[i],ci=r.checkIn,co=r.checkOut;
    if(!ci)continue;
    var color=r.cancelled?'#ccc':(r.color||'#888');
    var start=new Date(ci+'T00:00:00');
    var end=co?new Date(co+'T00:00:00'):new Date(start.getTime()+86400000);
    for(var d=new Date(start);d<end;d.setDate(d.getDate()+1)){
      var ds=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
      if(!map[ds])map[ds]=[];
      if(map[ds].length<3)map[ds].push(color);
    }
  }
  return map;
}

function renderMiniCal(){
  var today=todayStr(),datesMap=getBookingDatesMap();
  document.getElementById('mcTitle').textContent=MONTH_NAMES[mcMonth]+' '+mcYear;
  var firstDay=new Date(mcYear,mcMonth,1).getDay();
  var daysInMonth=new Date(mcYear,mcMonth+1,0).getDate();
  var daysInPrev=new Date(mcYear,mcMonth,0).getDate();
  var html='',dows=['Su','Mo','Tu','We','Th','Fr','Sa'];
  for(var i=0;i<7;i++)html+='<div class="mc-dow">'+dows[i]+'</div>';
  for(var p=firstDay-1;p>=0;p--)html+='<div class="mc-day empty other-month">'+(daysInPrev-p)+'</div>';
  for(var d=1;d<=daysInMonth;d++){
    var ds=mcYear+'-'+String(mcMonth+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    var cls='mc-day'+(ds===today?' today':'')+(ds===mcSelectedDate?' selected':'');
    var dots=datesMap[ds];
    html+='<div class="'+cls+'" onclick="mcSelectDate(\''+ds+'\')" data-date="'+ds+'">'+d;
    html+='<div class="mc-dots">';
    if(dots)for(var di=0;di<dots.length;di++)html+='<span class="mc-dot" style="background:'+dots[di]+'"></span>';
    html+='</div></div>';
  }
  var total=firstDay+daysInMonth,rem=total%7===0?0:7-total%7;
  for(var n=1;n<=rem;n++)html+='<div class="mc-day empty other-month">'+n+'</div>';
  document.getElementById('mcGrid').innerHTML=html;
}

window.mcPrev=function(){mcMonth--;if(mcMonth<0){mcMonth=11;mcYear--}renderMiniCal()};
window.mcNext=function(){mcMonth++;if(mcMonth>11){mcMonth=0;mcYear++}renderMiniCal()};
window.mcToday=function(){var d=new Date();mcYear=d.getFullYear();mcMonth=d.getMonth();mcSelectedDate=null;renderMiniCal();renderSidebar();renderList();renderWalkins()};
window.mcSelectDate=function(ds){
  mcSelectedDate=(mcSelectedDate===ds)?null:ds;
  renderMiniCal();renderSidebar();renderList();renderWalkins();
};

function getBookingsForDate(ds){
  return reservations.filter(function(r){
    if(!r.checkIn)return false;
    var co=r.checkOut||r.checkIn;
    return ds>=r.checkIn&&ds<co;
  });
}

function renderSidebar(){
  var stats={total:0,inhouse:0,checkedout:0,finalized:0};
  for(var i=0;i<reservations.length;i++){
    if(reservations[i].cancelled)continue;
    stats.total++;
    var st=getBookingStatus(reservations[i]);
    if(stats[st]!==undefined)stats[st]++;
  }
  var html='<div class="sidebar-stat-row">';
  html+='<div class="sidebar-stat-card"><div class="ssc-label">In House</div><div class="ssc-value" style="color:#15803D">'+stats.inhouse+'</div></div>';
  html+='<div class="sidebar-stat-card"><div class="ssc-label">Checked Out</div><div class="ssc-value" style="color:#B45309">'+stats.checkedout+'</div></div>';
  html+='</div>';
  html+='<div class="sidebar-stat-row">';
  html+='<div class="sidebar-stat-card"><div class="ssc-label">Finalized</div><div class="ssc-value" style="color:#7C3AED">'+stats.finalized+'</div></div>';
  html+='<div class="sidebar-stat-card"><div class="ssc-label">Total</div><div class="ssc-value">'+stats.total+'</div></div>';
  html+='</div>';
  document.getElementById('sidebarStats').innerHTML=html;

  var infoEl=document.getElementById('sidebarDateInfo');
  if(!mcSelectedDate){infoEl.innerHTML='';return;}
  var dateBookings=getBookingsForDate(mcSelectedDate);
  var ih='<div class="sdi-title"><i class="ti ti-calendar-event" style="font-size:13px"></i> '+fmtDate(mcSelectedDate)+' ('+dateBookings.length+')</div>';
  if(dateBookings.length===0){ih+='<div style="font-size:12px;color:#bbb;text-align:center;padding:12px">No bookings this date</div>';}
  else{for(var j=0;j<dateBookings.length;j++){
    var db=dateBookings[j],key=resKey(db),st=getBookingStatus(db),sc='status-'+st;
    ih+='<div class="sdi-item'+(selectedKey===key?' active':'')+'" onclick="window.selectBooking(\''+escAttr(key)+'\')">';
    ih+='<span class="sdi-dot" style="background:'+(db.cancelled?'#ccc':(db.color||'#888'))+'"></span>';
    ih+='<span class="sdi-name">'+esc(db.company||'Unknown')+'</span>';
    ih+='<span class="sdi-badge"><span class="status-badge '+sc+'" style="font-size:8px">'+st+'</span></span>';
    ih+='</div>';
  }}
  infoEl.innerHTML=ih;
}

/* ═══ BOOKING LIST ═══ */
function initData(){
  reservations=loadReservations();
  mcSelectedDate=todayStr();
  renderMiniCal();renderSidebar();renderList();renderWalkins();
}

window.setFilter=function(f,btn){
  currentFilter=f;
  document.querySelectorAll('.filter-btn').forEach(function(b){b.classList.remove('active')});
  if(btn)btn.classList.add('active');
  renderList();
};
document.getElementById('searchInput').addEventListener('input',function(){searchTerm=this.value.trim().toLowerCase();renderList()});

function renderList(){
  var dfBar=document.getElementById('dateFilterBar'),dfLabel=document.getElementById('dateFilterLabel');
  if(mcSelectedDate){dfBar.style.display='flex';dfLabel.textContent=fmtDate(mcSelectedDate);}
  else{dfBar.style.display='none';}

  var sorted=reservations.slice().sort(function(a,b){return a.checkIn>b.checkIn?-1:a.checkIn<b.checkIn?1:0});
  var active=[],cancelled=[];
  for(var i=0;i<sorted.length;i++){if(sorted[i].cancelled)cancelled.push(sorted[i]);else active.push(sorted[i])}
  sorted=active.concat(cancelled);

  var stats={total:0,inhouse:0,checkedout:0,finalized:0,upcoming:0};
  for(var i=0;i<reservations.length;i++){if(!reservations[i].cancelled){stats.total++;var s=getBookingStatus(reservations[i]);if(stats[s]!==undefined)stats[s]++}}
  document.getElementById('lpSummary').innerHTML=
    '<span class="lp-stat"><strong>'+stats.total+'</strong> total</span>'+
    '<span class="lp-stat green"><strong>'+stats.inhouse+'</strong> in house</span>'+
    '<span class="lp-stat orange"><strong>'+stats.checkedout+'</strong> out</span>';

  var filtered=[];
  for(var i=0;i<sorted.length;i++){
    var r=sorted[i],st=getBookingStatus(r);
    // Date filter
    if(mcSelectedDate){
      var co=r.checkOut||r.checkIn;
      if(!r.checkIn||!(mcSelectedDate>=r.checkIn&&mcSelectedDate<co))continue;
    }
    if(searchTerm){var hay=(r.company+' '+r.tripCode+' '+r.guide+' '+r.checkIn+' '+r.checkOut).toLowerCase();if(hay.indexOf(searchTerm)===-1)continue}
    if(currentFilter==='all')filtered.push(r);
    else if(currentFilter==='active'&&(st==='inhouse'||st==='upcoming'))filtered.push(r);
    else if(currentFilter==='checkedout'&&st==='checkedout')filtered.push(r);
    else if(currentFilter==='finalized'&&st==='finalized')filtered.push(r);
  }

  var list=document.getElementById('lpList');
  if(filtered.length===0){list.innerHTML='<div class="lp-empty"><i class="ti ti-tent-off"></i><div>No bookings found</div></div>';return}

  var html='';
  for(var i=0;i<filtered.length;i++){
    var r=filtered[i],key=resKey(r),st=getBookingStatus(r);
    var pax=(Number(r.adults)||0)+(Number(r.children48)||0)+(Number(r.children03)||0);
    var nights=nightCount(r.checkIn,r.checkOut);
    var sel=selectedKey===key?' selected':'',canc=r.cancelled?' cancelled':'';
    var statusLabel='',statusClass='';
    if(st==='inhouse'){statusLabel='In House';statusClass='status-inhouse'}
    else if(st==='upcoming'){statusLabel='Upcoming';statusClass='status-upcoming'}
    else if(st==='checkedout'){statusLabel='Checked Out';statusClass='status-checkedout'}
    else if(st==='finalized'){statusLabel='Finalized';statusClass='status-finalized'}
    else if(st==='cancelled'){statusLabel='Cancelled';statusClass='status-cancelled'}

    html+='<div class="bk-row'+sel+canc+'" onclick="window.selectBooking(\''+escAttr(key)+'\')">';
    html+='<div class="bk-dot" style="background:'+(r.color||'#ccc')+'"></div>';
    html+='<div class="bk-info"><div class="bk-company">'+esc(r.company)+'</div>';
    html+='<div class="bk-meta"><span><i class="ti ti-calendar"></i>'+fmtDateShort(r.checkIn)+' → '+fmtDateShort(r.checkOut)+'</span>';
    html+='<span><i class="ti ti-moon"></i>'+nights+'n</span><span><i class="ti ti-users"></i>'+pax+'</span></div></div>';
    html+='<div class="bk-right"><div class="bk-badges"><span class="status-badge '+statusClass+'">'+statusLabel+'</span></div></div></div>';
  }
  list.innerHTML=html;
}

/* ═══ WALK-IN SERVICES ═══ */
function getWalkinDate(){return mcSelectedDate||todayStr()}

function renderWalkins(){
  var date=getWalkinDate();
  var walkins=loadWalkins();
  var arr=walkins[date]||[];
  var container=document.getElementById('walkinList');

  if(arr.length===0){container.innerHTML='<div class="walkin-empty">No walk-in services'+(mcSelectedDate?' on '+fmtDateShort(mcSelectedDate):' today')+'</div>';return}

  var html='<div class="walkin-items">',total=0;
  for(var i=0;i<arr.length;i++){
    var w=arr[i],lineTotal=(w.price||0)*(w.qty||1);total+=lineTotal;
    html+='<div class="walkin-item">';
    html+='<span class="wi-desc">'+esc(w.description)+'</span>';
    html+='<span class="wi-qty">x'+w.qty+'</span>';
    html+='<span class="wi-amt">'+fmt(lineTotal)+'</span>';
    html+='<button class="wi-del" onclick="deleteWalkin(\''+esc(date)+'\','+i+')"><i class="ti ti-x"></i></button>';
    html+='</div>';
  }
  html+='</div>';
  html+='<div class="walkin-total"><span>Total ('+arr.length+' items)</span><span>'+fmt(total)+'</span></div>';
  container.innerHTML=html;
}

window.showWalkinForm=function(){document.getElementById('walkinForm').classList.add('show');document.getElementById('wiService').value='';document.getElementById('wiDesc').value='';document.getElementById('wiQty').value='1';document.getElementById('wiPrice').value='';document.getElementById('wiNote').value=''};
window.hideWalkinForm=function(){document.getElementById('walkinForm').classList.remove('show')};

window.onWiServiceChange=function(){
  var sel=document.getElementById('wiService');if(!sel.value)return;
  var parts=sel.value.split('|');
  var desc=document.getElementById('wiDesc'),price=document.getElementById('wiPrice');
  if(parts[0]==='custom'){desc.value='';price.value='';desc.focus();return}
  desc.value=parts[0]||'';
  var p=parseInt(parts[1])||0;price.value=p>0?p:'';
  if(p===0)price.focus();
};

window.saveWalkin=function(){
  var desc=(document.getElementById('wiDesc').value||'').trim();
  var qty=parseInt(document.getElementById('wiQty').value)||1;
  var price=parseFloat(document.getElementById('wiPrice').value)||0;
  var note=(document.getElementById('wiNote').value||'').trim();
  if(!desc){alert('Enter a description.');return}
  if(price<=0){alert('Enter a valid price.');return}
  var date=getWalkinDate();
  var walkins=loadWalkins();
  if(!walkins[date])walkins[date]=[];
  walkins[date].push({
    id:'WI-'+Date.now(),
    description:desc,
    qty:qty,
    price:price,
    note:note,
    addedBy:currentUser?currentUser.username:'camp',
    addedAt:new Date().toISOString()
  });
  saveWalkins(walkins);
  hideWalkinForm();
  renderWalkins();
};

window.deleteWalkin=function(date,idx){
  if(!confirm('Delete this walk-in item?'))return;
  var walkins=loadWalkins();
  if(walkins[date]){walkins[date].splice(idx,1);if(walkins[date].length===0)delete walkins[date]}
  saveWalkins(walkins);renderWalkins();
};

/* ═══ BOOKING DETAIL ═══ */
window.selectBooking=function(key){
  selectedKey=key;renderList();renderDetail();renderSidebar();
};

function findReservation(key){for(var i=0;i<reservations.length;i++){if(resKey(reservations[i])===key)return reservations[i]}return null}

function renderDetail(){
  var rpEmpty=document.getElementById('rpEmpty'),rpContent=document.getElementById('rpContent');
  if(!selectedKey){rpEmpty.style.display='';rpEmpty.classList.remove('hidden');rpContent.style.display='none';rpContent.classList.add('hidden');return}
  var r=findReservation(selectedKey);
  if(!r){rpEmpty.style.display='';rpEmpty.classList.remove('hidden');rpContent.style.display='none';rpContent.classList.add('hidden');return}
  rpEmpty.style.display='none';rpEmpty.classList.add('hidden');rpContent.style.display='flex';rpContent.classList.remove('hidden');

  var key=resKey(r),nights=nightCount(r.checkIn,r.checkOut);
  var pax=(Number(r.adults)||0)+(Number(r.children48)||0)+(Number(r.children03)||0);
  var gerCount=Array.isArray(r.gers)?r.gers.length:0;
  var st=getBookingStatus(r),tsData=loadTripStatus()[key]||null;

  var statusLabel='',statusClass='';
  if(st==='inhouse'){statusLabel='In House';statusClass='status-inhouse'}
  else if(st==='upcoming'){statusLabel='Upcoming';statusClass='status-upcoming'}
  else if(st==='checkedout'){statusLabel='Checked Out';statusClass='status-checkedout'}
  else if(st==='finalized'){statusLabel='Finalized';statusClass='status-finalized'}
  else if(st==='cancelled'){statusLabel='Cancelled';statusClass='status-cancelled'}

  // Header — no financial info, just people & gers
  var h='<div class="rp-company"><div class="dot" style="background:'+(r.color||'#ccc')+'"></div>'+esc(r.company);
  h+=' <span class="status-badge '+statusClass+'" style="font-size:10px;margin-left:6px">'+statusLabel+'</span></div>';
  h+='<div class="rp-meta">';
  h+='<span><i class="ti ti-calendar-event"></i>'+fmtDate(r.checkIn)+' → '+fmtDate(r.checkOut)+'</span>';
  h+='<span><i class="ti ti-moon"></i>'+nights+' nights</span>';
  h+='<span><i class="ti ti-users"></i>'+pax+' guests</span>';
  if(gerCount)h+='<span><i class="ti ti-home"></i>'+gerCount+' gers</span>';
  if(r.guide)h+='<span><i class="ti ti-user-star"></i>'+esc(r.guide)+'</span>';
  if(r.tripCode)h+='<span><i class="ti ti-hash"></i>'+esc(r.tripCode)+'</span>';
  h+='</div>';
  var actData=loadActuals()[key]||{};
  var actPax=actData.adults!==undefined?(Number(actData.adults)||0)+(Number(actData.children48)||0)+(Number(actData.children03)||0):pax;
  var actNights=actData.nights!==undefined?Number(actData.nights):nights;
  var actGers=actData.gers!==undefined?Number(actData.gers):gerCount;
  var hasActuals=actData.savedBy?true:false;
  h+='<div class="rp-stats">';
  if(hasActuals&&actPax!==pax){h+='<div class="rp-stat"><div class="rs-label">Guests</div><div class="rs-value orange">'+actPax+' <span style="font-size:10px;color:#bbb;font-weight:400">/ '+pax+'</span></div></div>'}
  else{h+='<div class="rp-stat"><div class="rs-label">Guests</div><div class="rs-value">'+pax+'</div></div>'}
  if(hasActuals&&actNights!==nights){h+='<div class="rp-stat"><div class="rs-label">Nights</div><div class="rs-value orange">'+actNights+' <span style="font-size:10px;color:#bbb;font-weight:400">/ '+nights+'</span></div></div>'}
  else{h+='<div class="rp-stat"><div class="rs-label">Nights</div><div class="rs-value">'+nights+'</div></div>'}
  if(hasActuals&&actGers!==gerCount){h+='<div class="rp-stat"><div class="rs-label">Gers</div><div class="rs-value orange">'+actGers+' <span style="font-size:10px;color:#bbb;font-weight:400">/ '+gerCount+'</span></div></div>'}
  else{h+='<div class="rp-stat"><div class="rs-label">Gers</div><div class="rs-value emerald">'+gerCount+'</div></div>'}
  var adjArr=loadAdjustments()[key]||[];
  h+='<div class="rp-stat"><div class="rs-label">Extra Items</div><div class="rs-value '+(adjArr.length>0?'orange':'')+'">'+adjArr.length+'</div></div>';
  h+='</div>';
  document.getElementById('rpHeader').innerHTML=h;

  // Body
  var body='';

  // Trip Summary — no financial info
  body+='<div class="rp-section"><div class="rp-section-title"><i class="ti ti-clipboard-list"></i> Trip Details</div>';
  body+='<div class="trip-line"><span class="tl-label">Company</span><span class="tl-value">'+esc(r.company)+'</span></div>';
  body+='<div class="trip-line"><span class="tl-label">Check-in</span><span class="tl-value">'+fmtDate(r.checkIn)+'</span></div>';
  body+='<div class="trip-line"><span class="tl-label">Check-out</span><span class="tl-value">'+fmtDate(r.checkOut)+'</span></div>';
  body+='<div class="trip-line"><span class="tl-label">Nights</span><span class="tl-value">'+nights+'</span></div>';
  body+='<div class="trip-line"><span class="tl-label">Adults</span><span class="tl-value">'+(r.adults||0)+'</span></div>';
  if(r.children48)body+='<div class="trip-line"><span class="tl-label">Children (4-8)</span><span class="tl-value">'+r.children48+'</span></div>';
  if(r.children03)body+='<div class="trip-line"><span class="tl-label">Children (0-3)</span><span class="tl-value">'+r.children03+'</span></div>';
  body+='<div class="trip-line"><span class="tl-label">Gers</span><span class="tl-value">'+gerCount+'</span></div>';
  if(r.gers&&r.gers.length>0){
    var gerNums=r.gers.map(function(g){return '#'+g.n}).join(', ');
    body+='<div class="trip-line"><span class="tl-label">Ger Numbers</span><span class="tl-value">'+esc(gerNums)+'</span></div>';
  }
  if(r.guide)body+='<div class="trip-line"><span class="tl-label">Guide</span><span class="tl-value">'+esc(r.guide)+'</span></div>';
  if(r.tripCode)body+='<div class="trip-line"><span class="tl-label">Trip Code</span><span class="tl-value">'+esc(r.tripCode)+'</span></div>';
  if(r.notes)body+='<div style="margin-top:10px;font-size:12px;color:#888;background:#fafaf7;padding:8px 10px;border-radius:6px;border:1px solid #eee"><i class="ti ti-note" style="margin-right:4px"></i>'+esc(r.notes)+'</div>';
  body+='</div>';

  // Actual Service Delivery
  var act=loadActuals()[key]||{};
  var bookedAdults=Number(r.adults)||0,bookedCh48=Number(r.children48)||0,bookedCh03=Number(r.children03)||0;
  var bookedNights=nights,bookedGers=gerCount;
  body+='<div class="rp-section"><div class="rp-section-title"><i class="ti ti-clipboard-check"></i> Actual Service Delivery</div>';
  body+='<div style="font-size:11px;color:#888;margin-bottom:6px">Adjust if actual numbers differ from the booking.</div>';
  body+='<table class="actuals-tbl"><thead><tr><th>Item</th><th style="text-align:center">Booked</th><th style="text-align:center">Actual</th><th style="text-align:center">Diff</th></tr></thead><tbody>';

  function actRow(label,bookedVal,field){
    var aVal=act[field]!==undefined&&act[field]!==null?Number(act[field]):bookedVal;
    var diff=aVal-bookedVal;
    var diffCls=diff===0?'same':diff<0?'less':'more';
    var diffTxt=diff===0?'—':diff>0?'+'+diff:''+diff;
    body+='<tr><td class="at-label">'+label+'</td>';
    body+='<td class="at-booked">'+bookedVal+'</td>';
    body+='<td class="at-actual"><input type="number" id="act_'+field+'" value="'+aVal+'" min="0"></td>';
    body+='<td class="at-diff '+diffCls+'">'+diffTxt+'</td></tr>';
  }
  actRow('Adults',bookedAdults,'adults');
  actRow('Children (4-8)',bookedCh48,'children48');
  actRow('Children (0-3)',bookedCh03,'children03');
  actRow('Nights',bookedNights,'nights');
  actRow('Gers',bookedGers,'gers');

  body+='</tbody></table>';
  body+='<div class="actuals-note"><label>Adjustment note (optional)</label>';
  body+='<textarea id="actNote" placeholder="e.g. 2 guests cancelled on arrival...">'+(act.note?esc(act.note):'')+'</textarea></div>';
  body+='<div class="actuals-save-row">';
  body+='<button class="actuals-save-btn" onclick="window.saveActuals(\''+escAttr(key)+'\')"><i class="ti ti-device-floppy"></i> Save Actuals</button>';
  body+='<span class="actuals-saved" id="actualsSaved"><i class="ti ti-check"></i> Saved</span>';
  if(act.savedBy)body+='<span style="font-size:10px;color:#bbb;margin-left:auto">Last saved by '+esc(act.savedBy)+' · '+esc(act.savedAt?(act.savedAt).slice(0,10):'')+'</span>';
  body+='</div></div>';

  // Extra Service Items (replaces old adjustments)
  body+='<div class="rp-section"><div class="rp-section-title"><i class="ti ti-list-details"></i> Extra Service Items</div>';
  if(adjArr.length>0){
    body+='<table class="adj-table"><thead><tr><th>Service</th><th style="text-align:right">Unit Price</th><th style="text-align:center">Qty</th><th style="text-align:right">Total</th><th></th></tr></thead><tbody>';
    for(var i=0;i<adjArr.length;i++){
      var a=adjArr[i];
      var qty=Number(a.qty)||1;
      var unitPrice=Number(a.unitPrice)||Number(a.amount)||0;
      var lineTotal=unitPrice*qty;
      body+='<tr><td>'+esc(a.description)+'<div style="font-size:10px;color:#bbb;margin-top:2px">by '+esc(a.addedBy)+' · '+esc(a.addedAt?(a.addedAt).slice(0,10):'')+'</div></td>';
      body+='<td style="text-align:right;font-size:12px;color:#666">'+fmt(unitPrice)+'</td>';
      body+='<td style="text-align:center;font-size:12px;color:#059669;font-weight:700">x'+qty+'</td>';
      body+='<td class="adj-amount charge">'+fmt(lineTotal)+'</td>';
      body+='<td><button class="adj-delete" onclick="window.deleteAdj(\''+escAttr(key)+'\',\''+esc(a.id)+'\')"><i class="ti ti-trash"></i></button></td></tr>';
    }
    body+='</tbody></table>';
    // Items summary
    var totalExtra=0;for(var j=0;j<adjArr.length;j++){var aq=Number(adjArr[j].qty)||1;totalExtra+=(Number(adjArr[j].unitPrice)||Number(adjArr[j].amount)||0)*aq}
    body+='<div style="display:flex;justify-content:space-between;padding:10px 8px 0;border-top:2px solid #eee;margin-top:6px;font-size:13px;font-weight:700">';
    body+='<span>Total Extra Services ('+adjArr.length+' items)</span><span style="color:#059669">'+fmt(totalExtra)+'</span></div>';
  } else {body+='<div class="adj-empty">No extra service items yet. Add from the menu below.</div>'}

  // Add service button
  body+='<div class="adj-actions" style="margin-top:12px">';
  body+='<button class="adj-btn adj-btn-charge" onclick="window.showAdjForm(\'charge\')"><i class="ti ti-plus"></i> Add Service Item</button></div>';

  // Service item form — menu-based
  body+='<div class="adj-form" id="adjForm">';
  body+='<div class="adj-form-title charge"><i class="ti ti-list-check"></i> <span>Add Service from Menu</span></div>';
  body+='<label>Select Service</label>';
  body+='<select id="adjService" onchange="window.onServiceChange()">';
  body+='<option value="">-- Choose a service --</option>';
  body+='<option value="horse_riding|Horse riding|80000">Horse riding — 80,000₮</option>';
  body+='<option value="camel_riding|Camel riding|60000">Camel riding — 60,000₮</option>';
  body+='<option value="archery|Archery|30000">Archery — 30,000₮</option>';
  body+='<option value="laundry|Laundry service|15000">Laundry service — 15,000₮</option>';
  body+='<option value="minibar|Minibar|0">Minibar — enter amount</option>';
  body+='<option value="extra_breakfast|Extra breakfast|12000">Extra breakfast — 12,000₮/pax</option>';
  body+='<option value="extra_lunch|Extra lunch|29000">Extra lunch — 29,000₮/pax</option>';
  body+='<option value="extra_dinner|Extra dinner|24000">Extra dinner — 24,000₮/pax</option>';
  body+='<option value="guide_tip|Guide tip|0">Guide tip — enter amount</option>';
  body+='<option value="transfer|Airport/city transfer|150000">Airport/city transfer — 150,000₮</option>';
  body+='<option value="medical|Medical assistance|0">Medical assistance — enter amount</option>';
  body+='<option value="equipment|Equipment rental|0">Equipment rental — enter amount</option>';
  body+='<option value="custom|custom|0">✎ Other / Custom item...</option>';
  body+='</select>';
  body+='<div id="adjCustomFields" style="display:none"><label>Description</label><input type="text" id="adjDesc" placeholder="Service description"></div>';
  body+='<div style="display:flex;gap:8px"><div style="flex:1"><label>Unit Price (₮)</label><input type="number" id="adjUnitPrice" placeholder="0" min="0"></div>';
  body+='<div style="max-width:80px"><label>Quantity</label><input type="number" id="adjQty" value="1" min="1"></div></div>';
  body+='<div style="margin-top:4px;font-size:12px;color:#059669;font-weight:700" id="adjTotalPreview"></div>';
  body+='<label>Note (optional)</label><textarea id="adjNote" placeholder="Optional note..." rows="2"></textarea>';
  body+='<div class="adj-form-actions">';
  body+='<button class="adj-form-btn adj-form-save" onclick="window.saveAdj()"><i class="ti ti-check"></i> Add Item</button>';
  body+='<button class="adj-form-btn adj-form-cancel" onclick="window.hideAdjForm()"><i class="ti ti-x"></i> Cancel</button></div></div>';
  body+='</div>';

  // Finalize
  body+='<div class="rp-section finalize-section"><div class="rp-section-title"><i class="ti ti-circle-check"></i> Trip Finalization</div>';
  if(tsData&&tsData.status==='finalized'){
    body+='<div class="finalized-info"><i class="ti ti-circle-check-filled"></i><div class="fi-text">';
    body+='<div class="fi-who">Finalized by '+esc(tsData.finalizedBy)+' ('+esc(tsData.finalizedRole)+')</div>';
    body+='<div class="fi-when">'+fmtDate(tsData.finalizedAt?(tsData.finalizedAt).slice(0,10):'')+' at '+(tsData.finalizedAt?(tsData.finalizedAt).slice(11,16):'')+'</div>';
    if(tsData.notes)body+='<div class="fi-notes">"'+esc(tsData.notes)+'"</div>';
    body+='</div></div>';
    body+='<button class="finalize-btn finalize-btn-reopen" onclick="window.reopenTrip(\''+escAttr(key)+'\')"><i class="ti ti-arrow-back-up"></i> Override / Re-open Trip</button>';
  } else {
    body+='<div class="finalize-box"><label>Finalization Notes (optional)</label>';
    body+='<textarea id="finalizeNotes" placeholder="Any notes about the trip completion..."></textarea>';
    body+='<button class="finalize-btn finalize-btn-go" onclick="window.finalizeTrip(\''+escAttr(key)+'\')"><i class="ti ti-circle-check"></i> Finalize Trip</button></div>';
  }
  body+='</div>';

  document.getElementById('rpBody').innerHTML=body;

  // Wire up live total preview
  var upEl=document.getElementById('adjUnitPrice'),qEl=document.getElementById('adjQty');
  if(upEl&&qEl){
    function updatePreview(){
      var up=parseFloat(upEl.value)||0,q=parseInt(qEl.value)||1;
      var prev=document.getElementById('adjTotalPreview');
      if(prev)prev.textContent=up>0?'Total: '+fmt(up*q):'';
    }
    upEl.addEventListener('input',updatePreview);
    qEl.addEventListener('input',updatePreview);
  }
}

/* ═══ SERVICE ITEM FORM ═══ */
window.showAdjForm=function(){
  var form=document.getElementById('adjForm');if(!form)return;form.classList.add('show');
  var s=document.getElementById('adjService');if(s)s.value='';
  var cf=document.getElementById('adjCustomFields');if(cf)cf.style.display='none';
  var d=document.getElementById('adjDesc');if(d)d.value='';
  var up=document.getElementById('adjUnitPrice');if(up)up.value='';
  var q=document.getElementById('adjQty');if(q)q.value='1';
  var n=document.getElementById('adjNote');if(n)n.value='';
  var tp=document.getElementById('adjTotalPreview');if(tp)tp.textContent='';
};
window.hideAdjForm=function(){var f=document.getElementById('adjForm');if(f)f.classList.remove('show')};
window.onServiceChange=function(){
  var s=document.getElementById('adjService');if(!s||!s.value)return;
  var parts=s.value.split('|');
  var cf=document.getElementById('adjCustomFields');
  var desc=document.getElementById('adjDesc');
  var up=document.getElementById('adjUnitPrice');
  if(parts[1]==='custom'){
    // Custom item — show description field, clear price
    if(cf)cf.style.display='block';
    if(desc)desc.value='';
    if(up){up.value='';up.focus()}
    return;
  }
  // Menu item — hide description field, auto-fill
  if(cf)cf.style.display='none';
  if(desc)desc.value=parts[1]||'';
  var price=parseInt(parts[2])||0;
  if(up){up.value=price>0?price:'';if(price===0)up.focus()}
  // Trigger preview update
  var q=document.getElementById('adjQty');
  var prev=document.getElementById('adjTotalPreview');
  if(prev&&price>0){var qty=parseInt(q?q.value:'1')||1;prev.textContent='Total: '+fmt(price*qty)}
};
window.saveAdj=function(){
  if(!selectedKey||!currentUser)return;
  var svc=document.getElementById('adjService');
  var descEl=document.getElementById('adjDesc');
  var upEl=document.getElementById('adjUnitPrice');
  var qEl=document.getElementById('adjQty');
  var noteEl=document.getElementById('adjNote');

  var svcVal=svc?svc.value:'';
  if(!svcVal){alert('Please select a service from the menu.');return}

  var parts=svcVal.split('|');
  var isCustom=parts[1]==='custom';
  var desc=isCustom?(descEl?descEl.value:'').trim():(parts[1]||'');
  var unitPrice=parseFloat(upEl?upEl.value:'0');
  var qty=parseInt(qEl?qEl.value:'1')||1;
  var note=(noteEl?noteEl.value:'').trim();
  var category=parts[0]||'custom';

  if(!desc){alert('Please enter a description.');return}
  if(!unitPrice||unitPrice<=0){alert('Please enter a valid unit price.');return}

  var adj=loadAdjustments();if(!adj[selectedKey])adj[selectedKey]=[];
  adj[selectedKey].push({
    id:'ADJ-'+Date.now(),
    type:'charge',
    description:desc,
    amount:unitPrice*qty,
    unitPrice:unitPrice,
    qty:qty,
    category:category,
    note:note,
    addedBy:currentUser.username,
    addedAt:new Date().toISOString()
  });
  saveAdjustments(adj);window.hideAdjForm();renderDetail();
};
window.deleteAdj=function(key,id){
  if(!confirm('Delete this item?'))return;
  var adj=loadAdjustments();if(!adj[key])return;
  adj[key]=adj[key].filter(function(a){return a.id!==id});
  saveAdjustments(adj);renderDetail();
};

/* ═══ SAVE ACTUALS ═══ */
window.saveActuals=function(key){
  if(!currentUser)return;
  var fields=['adults','children48','children03','nights','gers'];
  var data={};
  for(var i=0;i<fields.length;i++){
    var el=document.getElementById('act_'+fields[i]);
    if(el)data[fields[i]]=parseInt(el.value)||0;
  }
  var noteEl=document.getElementById('actNote');
  data.note=noteEl?(noteEl.value||'').trim():'';
  data.savedBy=currentUser.username;
  data.savedAt=new Date().toISOString();
  var all=loadActuals();all[key]=data;saveActuals(all);
  // Show saved confirmation
  var badge=document.getElementById('actualsSaved');
  if(badge){badge.style.display='inline-flex';setTimeout(function(){badge.style.display='none'},2500)}
  // Refresh header stats to show actual numbers
  renderDetail();
};

/* ═══ FINALIZE / REOPEN ═══ */
window.finalizeTrip=function(key){
  if(!currentUser)return;if(!confirm('Finalize this trip? This marks the trip as completed.'))return;
  var notes='';var el=document.getElementById('finalizeNotes');if(el)notes=el.value.trim();
  var ts=loadTripStatus();
  ts[key]={status:'finalized',finalizedBy:currentUser.username,finalizedAt:new Date().toISOString(),finalizedRole:currentUser.role,notes:notes};
  saveTripStatus(ts);renderList();renderDetail();renderSidebar();
};
window.reopenTrip=function(key){
  if(!currentUser)return;if(!confirm('Re-open this trip? This allows further adjustments.'))return;
  var ts=loadTripStatus();if(ts[key])ts[key].status='pending';
  saveTripStatus(ts);renderList();renderDetail();renderSidebar();
};

/* ═══ KEYBOARD ═══ */
document.addEventListener('keydown',function(e){
  if(e.key==='Escape'){selectedKey=null;mcSelectedDate=null;renderMiniCal();renderSidebar();renderList();renderDetail();renderWalkins()}
});
window.addEventListener('storage',function(e){
  if(e.key==='kz_reservations'||e.key==='kz_trip_status'||e.key==='kz_trip_adjustments'||e.key==='kz_payments')initData();
});

/* ═══ BOOT ═══ */
if(checkSession())showApp();

})();
</script>
